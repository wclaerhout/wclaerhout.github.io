---
layout: default
---

<article class="post-wrap">
  <a href="/" class="back-link">← all posts</a>

  <div class="post-meta">
    <span class="post-date-label">{{ page.date | date: "%Y-%m-%d" }}</span>
    {% for tag in page.tags %}
    <span class="post-tag">#{{ tag }}</span>
    {% endfor %}
  </div>

  <h1 class="post-title">{{ page.title }}</h1>

  {% if page.lede %}
  <p class="post-lede">{{ page.lede }}</p>
  {% endif %}

  <div class="prose">
    {{ content }}
  </div>
</article>
