---
layout: default
title: Notebooks
---

<div class="main-layout" style="max-width:860px;margin:2.5rem auto;padding:0 1.5rem;">
  <main style="width:100%">
    <div class="section-label">Pluto Notebooks</div>
    <div class="post-list">

      {% for nb in site.data.notebooks %}
      <a href="{{ nb.url }}" class="post-item">
        <div class="post-date">{{ nb.date | date: "%Y" }}<br/>{{ nb.date | date: "%b" }}</div>
        <div>
          <div class="post-title">{{ nb.title }}</div>
          <div class="post-desc">{{ nb.description }}</div>
          <div class="post-tags">
            {% for tag in nb.tags %}<span class="post-tag">#{{ tag }}</span>{% endfor %}
          </div>
        </div>
      </a>
      {% endfor %}

    </div>
  </main>
</div>
